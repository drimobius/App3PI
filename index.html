<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTMEX Poka-Yoke</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #000; color: white; overflow: hidden; }
        video { width: 100%; height: 50%; object-fit: cover; }
        .panel { position: fixed; bottom: 0; width: 100%; height: 50%; background: white; color: #333; border-radius: 20px 20px 0 0; padding: 25px; box-sizing: border-box; }
        .btn-next { background: #1a1c2c; color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 18px; }
        .status-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; }
        .lock-screen { position: fixed; top: 0; width: 100%; height: 100%; background: #e30613; z-index: 3000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; box-sizing: border-box; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
    </style>
</head>
<body>

<video id="webcam" autoplay playsinline></video>

<div class="panel">
    <div id="ui-login">
        <h2 style="color:#e30613; margin-top:0;">Acceso KTMEX</h2>
        <input type="text" id="nom-input" placeholder="Nómina">
        <div id="pin-box" style="display:none;">
            <input type="password" id="pin-input" placeholder="Introduce tu PIN">
        </div>
        <button class="btn-next" onclick="handleLogin()">Siguiente</button>
    </div>

    <div id="ui-scan" style="display:none;">
        <h3 id="step-label">PASO 1: JAMAITA</h3>
        <p id="step-hint" style="color:#666;">Buscando código...</p>
        <div id="match-val" style="font-size:28px; font-weight:bold; color:#e30613; text-align:center; padding:15px;">---</div>
        <button id="btn-resume" class="btn-next" style="display:none; background:#27ae60;" onclick="resumeWorkflow()">CONTINUAR</button>
    </div>
</div>

<div id="overlay-ok" class="status-overlay" style="background:rgba(39, 174, 96, 0.95);">✅ CORRECTO</div>
<div id="overlay-ng" class="status-overlay" style="background:rgba(227, 6, 19, 0.95);">❌ INCORRECTO</div>

<div id="lock" class="lock-screen">
    <h1 style="font-size:60px;">🛑</h1>
    <h2>DISPOSITIVO BLOQUEADO</h2>
    <p id="lock-msg" style="margin-bottom:20px;"></p>
    <input type="password" id="pin-tl" placeholder="PIN DE LÍDER" style="text-align:center;">
    <button class="btn-next" style="background:white; color:red;" onclick="validateUnlock()">DESBLOQUEAR</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = { /* Mismos datos App A */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let step = 1;
    let user = null;
    let isPaused = false;
    let jamaita = "";
    let partData = null;

    // Login Condicional
    window.handleLogin = async () => {
        const nom = document.getElementById('nom-input').value;
        const pin = document.getElementById('pin-input').value;
        const snap = await getDoc(doc(db, "Usuarios", nom));

        if(!snap.exists()) return alert("Nómina no registrada");
        const u = snap.data();

        if(u.nivel === "Operador") {
            startSession(u);
        } else {
            document.getElementById('pin-box').style.display = 'block';
            if(pin === u.pin) startSession(u);
            else if(pin !== "") alert("PIN Incorrecto");
        }
    };

    function startSession(u) {
        user = u;
        document.getElementById('ui-login').style.display = 'none';
        document.getElementById('ui-scan').style.display = 'block';
        initCamera();
    }

    async function initCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('webcam').srcObject = stream;
        runOCR();
    }

    async function runOCR() {
        if(isPaused || step > 3) return;
        
        const canvas = document.createElement('canvas');
        canvas.width = 400; canvas.height = 300;
        canvas.getContext('2d').drawImage(document.getElementById('webcam'), 0, 0, 400, 300);
        
        const { data: { text } } = await Tesseract.recognize(canvas, 'eng');
        const raw = text.replace(/\s/g, '').toUpperCase();
        
        const mJ = raw.match(/[KTP]\d{3}/);
        const mM = raw.match(/M\d{3,4}/);

        if(step === 1 && mJ) handleMatch(mJ[0]);
        else if(step === 2 && mJ) handleMatch(mJ[0]);
        else if(step === 3 && mM) handleMatch(mM[0]);

        requestAnimationFrame(runOCR);
    }

    function handleMatch(val) {
        isPaused = true;
        document.getElementById('match-val').innerText = val;

        if(step === 1) {
            jamaita = val;
            flashStatus(true);
        } else if(step === 2) {
            if(val === jamaita) flashStatus(true);
            else flashStatus(false, `Mezcla: Jamaita era ${jamaita} y Caja es ${val}`);
        } else if(step === 3) {
            checkFinal(val);
        }
    }

    function flashStatus(ok, msg = "") {
        const id = ok ? 'overlay-ok' : 'overlay-ng';
        document.getElementById(id).style.display = 'flex';
        setTimeout(() => {
            document.getElementById(id).style.display = 'none';
            if(ok) document.getElementById('btn-resume').style.display = 'block';
            else triggerLock(msg);
        }, 1500);
    }

    window.resumeWorkflow = () => {
        step++;
        isPaused = false;
        document.getElementById('btn-resume').style.display = 'none';
        document.getElementById('match-val').innerText = "---";
        if(step === 2) document.getElementById('step-label').innerText = "PASO 2: CAJA";
        if(step === 3) document.getElementById('step-label').innerText = "PASO 3: TTMX";
        runOCR();
    };

    async function checkFinal(mId) {
        const snap = await getDoc(doc(db, "Maestro_Partes", mId));
        if(snap.exists() && String(snap.data().Sebango) === jamaita) {
            partData = snap.data();
            flashStatus(true);
            // Aquí iría el Quiz de Tekin...
        } else { flashStatus(false, `Error Cruzado: ${mId} no es para ${jamaita}`); }
    }

    function triggerLock(txt) {
        document.getElementById('lock-msg').innerText = txt;
        document.getElementById('lock').style.display = 'flex';
        logEvent("ERROR", jamaita, txt);
    }

    window.validateUnlock = async () => {
        const pin = document.getElementById('pin-tl').value;
        const q = query(collection(db, "Usuarios"), where("nivel", "==", "Lider"), where("pin", "==", pin));
        const snap = await getDocs(q);
        if(!snap.empty) location.reload();
        else alert("PIN de Líder Incorrecto");
    };

    async function logEvent(st, id, err = "") {
        await addDoc(collection(db, "Bitacora_Incidencias"), {
            usuario: user.nombre, status: st, customer_id: id, error_msg: err, timestamp: serverTimestamp()
        });
    }
</script>
</body>
</html>
