<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTMEX Scanner Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #000; color: white; overflow: hidden; }
        video { width: 100%; height: 50%; object-fit: cover; border-bottom: 4px solid #e30613; }
        .panel { position: fixed; bottom: 0; width: 100%; height: 50%; background: white; color: #333; border-radius: 25px 25px 0 0; padding: 25px; box-sizing: border-box; }
        .btn-next { background: #1a1c2c; color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; margin-top: 10px; width: 100%; }
        .btn-retry { background: #f39c12; color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; margin-top: 10px; display: none; cursor: pointer; }
        .status-overlay { position: fixed; top: 0; width: 100%; height: 100%; z-index: 2000; display: none; align-items: center; justify-content: center; font-size: 35px; font-weight: bold; text-align: center; }
        input { width: 100%; padding: 16px; margin-bottom: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        #res-val { font-size: 32px; font-weight: 800; color: #e30613; text-align: center; padding: 10px; background: #fff5f5; border-radius: 15px; border: 2px dashed #e30613; min-height: 40px; }
    </style>
</head>
<body>

<video id="webcam" autoplay playsinline></video>

<div class="panel">
    <div id="ui-login">
        <h2 style="color:#e30613; margin-top:0;">Acceso KTMEX</h2>
        <input type="text" id="nom-input" placeholder="Nómina">
        <div id="pin-box" style="display:none;"><input type="password" id="pin-input" placeholder="PIN Líder"></div>
        <button class="btn-next" onclick="checkLogin()">INGRESAR</button>
    </div>

    <div id="ui-scan" style="display:none;">
        <h3 id="step-txt">PASO 1: ESCANEAR JAMAITA</h3>
        <div id="res-val">---</div>
        
        <div id="actions-area" style="margin-top: 10px;">
            <button id="btn-res" class="btn-next" style="display:none; background:#27ae60;" onclick="goNext()">CONTINUAR</button>
            <button id="btn-retry-ui" class="btn-retry" onclick="retryScan()">🔄 REPETIR ESCANEO</button>
        </div>
    </div>
</div>

<div id="ok-msg" class="status-overlay" style="background:rgba(39,174,96,0.95); color:white;">✅ LECTURA OK</div>
<div id="ng-msg" class="status-overlay" style="background:rgba(211, 47, 47, 0.95); color:white;">❌ ERROR</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA6Il03GHS4L_eDY1Kv3fMyF2EwuYLQ5qY",
        authDomain: "logistica-ktmex.firebaseapp.com",
        projectId: "logistica-ktmex",
        storageBucket: "logistica-ktmex.firebasestorage.app",
        messagingSenderId: "166597623735",
        appId: "1:166597623735:web:c0f8d372bc1ee12d81b232"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let user = null; let step = 1; let jamaita = ""; let paused = false;

    window.checkLogin = async () => {
        const nom = document.getElementById('nom-input').value;
        const pin = document.getElementById('pin-input').value;
        const s = await getDoc(doc(db, "Usuarios", nom));
        if(!s.exists()) return alert("Nómina no encontrada");
        const u = s.data();
        if(u.nivel === "Operador") start(u);
        else {
            document.getElementById('pin-box').style.display = 'block';
            if(pin === u.pin) start(u);
            else if(pin !== "") alert("PIN Incorrecto");
        }
    };

    function start(u) {
        user = u; 
        document.getElementById('ui-login').style.display = 'none';
        document.getElementById('ui-scan').style.display = 'block';
        navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}}).then(s => {
            document.getElementById('webcam').srcObject = s; 
            ocrLoop();
        });
    }

    async function ocrLoop() {
        if(paused || step > 3) return;
        const v = document.getElementById('webcam');
        const c = document.createElement('canvas'); c.width = 400; c.height = 300;
        c.getContext('2d').drawImage(v, 0, 0, 400, 300);
        const { data: { text } } = await Tesseract.recognize(c, 'eng');
        const raw = text.replace(/[^A-Z0-9]/g, '').toUpperCase();
        
        const patternSebango = raw.match(/([TKP]\d{3,4})/);
        const patternCliente = raw.match(/(M\d{3,4})/);

        if ((step === 1 || step === 2) && patternSebango) found(patternSebango[0]);
        else if (step === 3 && patternCliente) found(patternCliente[0]);

        requestAnimationFrame(ocrLoop);
    }

    function found(val) {
        paused = true; 
        document.getElementById('res-val').innerText = val;
        
        // Mostrar siempre el botón de reintento cuando hay una detección
        document.getElementById('btn-retry-ui').style.display = 'block';

        if(step === 1) { 
            jamaita = val; 
            showFeedback(true); 
        } else if(step === 2) { 
            if(val === jamaita) showFeedback(true); 
            else showFeedback(false, "Mezcla detectada"); 
        } else if(step === 3) {
            checkDatabase(val);
        }
    }

    async function checkDatabase(id) {
        const s = await getDoc(doc(db, "Maestro_Partes", id));
        if(s.exists() && String(s.data().Sebango) === jamaita) showFeedback(true);
        else showFeedback(false, "ID incorrecto para esta Jamaita");
    }

    function showFeedback(ok, msg="") {
        const el = ok ? 'ok-msg' : 'ng-msg';
        document.getElementById(el).style.display = 'flex';
        
        setTimeout(() => {
            document.getElementById(el).style.display = 'none';
            if(ok) {
                document.getElementById('btn-res').style.display = 'block';
            } else {
                // En caso de error, el botón de reintento ya está visible desde found()
                logErrorToFirebase(msg);
            }
        }, 1200);
    }

    window.retryScan = () => {
        paused = false;
        document.getElementById('btn-retry-ui').style.display = 'none';
        document.getElementById('btn-res').style.display = 'none';
        document.getElementById('res-val').innerText = "---";
        ocrLoop();
    };

    window.goNext = () => {
        step++; 
        paused = false; 
        document.getElementById('btn-res').style.display = 'none';
        document.getElementById('btn-retry-ui').style.display = 'none';
        document.getElementById('res-val').innerText = "---";
        
        const txt = document.getElementById('step-txt');
        if(step === 2) txt.innerText = "PASO 2: ESCANEAR CAJA";
        if(step === 3) txt.innerText = "PASO 3: ESCANEAR ID CLIENTE (M)";
        ocrLoop();
    };

    function logErrorToFirebase(m) {
        addDoc(collection(db, "Bitacora_Incidencias"), { 
            usuario: user.nombre, status: "NG", customer_id: jamaita, error_msg: m, timestamp: serverTimestamp() 
        });
    }
</script>
</body>
</html>
