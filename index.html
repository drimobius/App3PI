<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTMEX Scanner</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #000; color: white; overflow: hidden; }
        video { width: 100%; height: 50%; object-fit: cover; }
        .panel { position: fixed; bottom: 0; width: 100%; height: 50%; background: white; color: #333; border-radius: 20px 20px 0 0; padding: 25px; box-sizing: border-box; }
        .btn-next { background: #1a1c2c; color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 18px; width: 100%; margin-top: 10px; }
        .status-overlay { position: fixed; top: 0; width: 100%; height: 100%; z-index: 2000; display: none; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; }
        .lock-ui { position: fixed; top: 0; width: 100%; height: 100%; background: #e30613; z-index: 3000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
    </style>
</head>
<body>

<video id="webcam" autoplay playsinline></video>

<div class="panel">
    <div id="ui-login">
        <h2 style="color:#e30613; margin-top:0;">Acceso KTMEX</h2>
        <input type="text" id="nom-input" placeholder="Nómina">
        <div id="pin-box" style="display:none;">
            <input type="password" id="pin-input" placeholder="PIN de Líder">
        </div>
        <button class="btn-next" onclick="checkLogin()">Ingresar</button>
    </div>

    <div id="ui-scan" style="display:none;">
        <h3 id="step-txt">PASO 1: JAMAITA</h3>
        <div id="res-val" style="font-size:30px; font-weight:bold; color:#e30613; text-align:center; padding:20px;">---</div>
        <button id="btn-res" class="btn-next" style="display:none; background:#27ae60;" onclick="goNext()">CONTINUAR</button>
    </div>
</div>

<div id="ok-msg" class="status-overlay" style="background:rgba(39,174,96,0.9);">✅ CORRECTO</div>
<div id="ng-msg" class="status-overlay" style="background:rgba(227,6,19,0.9);">❌ ERROR</div>

<div id="lock" class="lock-ui">
    <h1 style="font-size:60px;">🛑</h1>
    <h2 id="lock-reason">BLOQUEO</h2>
    <input type="password" id="pin-tl" placeholder="PIN LÍDER" style="text-align:center;">
    <button class="btn-next" style="background:white; color:red;" onclick="unlock()">DESBLOQUEAR</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = { /* Mismos datos App A */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let user = null; let step = 1; let jamaita = ""; let paused = false;

    window.checkLogin = async () => {
        const nom = document.getElementById('nom-input').value;
        const pin = document.getElementById('pin-input').value;
        const s = await getDoc(doc(db, "Usuarios", nom));
        if(!s.exists()) return alert("No existe");
        const u = s.data();

        if(u.nivel === "Operador") start(u);
        else {
            document.getElementById('pin-box').style.display = 'block';
            if(pin === u.pin) start(u);
            else if(pin !== "") alert("PIN Mal");
        }
    };

    function start(u) {
        user = u; document.getElementById('ui-login').style.display = 'none';
        document.getElementById('ui-scan').style.display = 'block';
        navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}}).then(s => {
            document.getElementById('webcam').srcObject = s; loop();
        });
    }

    async function loop() {
        if(paused || step > 3) return;
        const v = document.getElementById('webcam');
        const c = document.createElement('canvas'); c.width = 400; c.height = 300;
        c.getContext('2d').drawImage(v, 0, 0, 400, 300);
        const { data: { text } } = await Tesseract.recognize(c, 'eng');
        const raw = text.replace(/\s/g, '').toUpperCase();
        
        const mJ = raw.match(/[KTP]\d{3}/);
        const mM = raw.match(/M\d{3,4}/);

        if(step === 1 && mJ) found(mJ[0]);
        else if(step === 2 && mJ) found(mJ[0]);
        else if(step === 3 && mM) found(mM[0]);

        requestAnimationFrame(loop);
    }

    function found(val) {
        paused = true; document.getElementById('res-val').innerText = val;
        if(step === 1) { jamaita = val; show(true); }
        else if(step === 2) { if(val === jamaita) show(true); else show(false, "Mezcla de Sebango"); }
        else if(step === 3) checkM(val);
    }

    async function checkM(id) {
        const s = await getDoc(doc(db, "Maestro_Partes", id));
        if(s.exists() && String(s.data().Sebango) === jamaita) show(true);
        else show(false, "ID no corresponde a Jamaita");
    }

    function show(ok, msg="") {
        const el = ok ? 'ok-msg' : 'ng-msg';
        document.getElementById(el).style.display = 'flex';
        setTimeout(() => {
            document.getElementById(el).style.display = 'none';
            if(ok) document.getElementById('btn-res').style.display = 'block';
            else lock(msg);
        }, 1500);
    }

    window.goNext = () => {
        step++; paused = false; document.getElementById('btn-res').style.display = 'none';
        document.getElementById('res-val').innerText = "---";
        document.getElementById('step-txt').innerText = step === 2 ? "PASO 2: CAJA" : "PASO 3: TTMX";
        loop();
    };

    function lock(m) {
        document.getElementById('lock-reason').innerText = m;
        document.getElementById('lock').style.display = 'flex';
        addDoc(collection(db, "Bitacora_Incidencias"), { usuario: user.nombre, status: "ERROR", error_msg: m, timestamp: serverTimestamp() });
    }

    window.unlock = async () => {
        const p = document.getElementById('pin-tl').value;
        const q = query(collection(db, "Usuarios"), where("nivel", "==", "Lider"), where("pin", "==", p));
        const s = await getDocs(q);
        if(!s.empty) location.reload(); else alert("PIN Incorrecto");
    };
</script>
</body>
</html>
