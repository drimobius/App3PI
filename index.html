<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTMEX Poka-Yoke V4.4</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #000; color: white; overflow: hidden; }
        video { width: 100%; height: 40%; object-fit: cover; }
        .panel { position: fixed; bottom: 0; width: 100%; height: 60%; background: white; color: #333; border-radius: 25px 25px 0 0; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .btn-main { background: #1a1c2c; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; font-size: 16px; margin-top: 10px; cursor: pointer; }
        .btn-flash { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); color: white; border: 1px solid white; padding: 12px; border-radius: 50%; z-index: 100; font-size: 20px; }
        #res-val { font-size: 26px; font-weight: 800; color: #e30613; text-align: center; border: 2px dashed #e30613; margin: 10px 0; padding: 10px; background: #fff5f5; border-radius: 10px; min-height: 40px; }
        .img-verify { width: 100%; height: 140px; object-fit: contain; background: #f0f0f0; border-radius: 12px; display: none; margin-bottom: 10px; border: 1px solid #ddd; }
        .option-btn { background: #f8f9fa; border: 2px solid #dee2e6; color: #333; padding: 12px; width: 100%; border-radius: 8px; margin-bottom: 8px; text-align: left; font-weight: 600; cursor: pointer; }
        .lock-ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #e30613; z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        input { width: 85%; padding: 15px; border-radius: 8px; border: 1px solid #ccc; font-size: 18px; text-align: center; margin-bottom: 10px; }
        #retry-counter { font-size: 13px; color: #666; text-align: center; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

<button class="btn-flash" onclick="toggleFlash()">🔦</button>
<video id="webcam" autoplay playsinline></video>

<div class="panel">
    <div id="ui-login">
        <h2 style="color:#e30613; margin-top:0;">Acceso KTMEX</h2>
        <input type="text" id="nom-input" placeholder="Nómina">
        <div id="pin-box" style="display:none;"><input type="password" id="pin-input" placeholder="PIN Líder"></div>
        <button class="btn-main" onclick="checkLogin()">INGRESAR</button>
    </div>

    <div id="ui-scan" style="display:none;">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <h3 id="step-txt" style="margin:0; color:#1a1c2c;">PASO 1: JAMAITA</h3>
            <span id="user-display" style="font-size:10px; color:#999;"></span>
        </div>
        <div id="res-val">---</div>
        
        <div id="step4-container" style="display:none;">
            <p style="font-weight:bold; font-size:14px; margin-bottom:5px;">Confirme Tekin Visual:</p>
            <img id="img-tekin" class="img-verify">
            <div id="options-area"></div>
        </div>
        
        <div id="controls-standard">
            <button id="btn-res" class="btn-main" style="display:none; background:#27ae60;" onclick="goNext()">CONTINUAR</button>
            <button id="btn-retry" class="btn-main" style="background:#f39c12;" onclick="handleRetry()">🔄 REPETIR ESCANEO</button>
            <div id="retry-counter">Intentos: 0/5</div>
        </div>
        
        <button id="btn-finish" class="btn-main" style="display:none; background:#27ae60;" onclick="resetToStepOne()">✅ FINALIZAR PIEZA</button>
    </div>
</div>

<div id="lock" class="lock-ui">
    <h1 style="font-size:50px; margin:0;">🛑</h1>
    <h2 id="lock-msg">SISTEMA BLOQUEADO</h2>
    <p>Requiere validación de Líder (PIN).</p>
    <input type="password" id="pin-tl" placeholder="PIN LÍDER">
    <button class="btn-main" style="background:white; color:#e30613; width:85%;" onclick="unlock()">DESBLOQUEAR</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA6Il03GHS4L_eDY1Kv3fMyF2EwuYLQ5qY",
        authDomain: "logistica-ktmex.firebaseapp.com",
        projectId: "logistica-ktmex",
        storageBucket: "logistica-ktmex.firebasestorage.app",
        messagingSenderId: "166597623735",
        appId: "1:166597623735:web:c0f8d372bc1ee12d81b232"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let user = null; let step = 1; let jamaita = ""; let paused = false; let track = null;
    let correctTekin = ""; let retryCount = 0; let pendingData = null;

    window.toggleFlash = async () => {
        if (!track) return;
        try {
            const caps = track.getCapabilities();
            if (caps.torch) {
                const s = track.getSettings();
                await track.applyConstraints({ advanced: [{ torch: !s.torch }] });
            }
        } catch(e) { console.log("Flash no soportado"); }
    };

    window.checkLogin = async () => {
        const nom = document.getElementById('nom-input').value;
        const pin = document.getElementById('pin-input').value;
        const s = await getDoc(doc(db, "Usuarios", nom));
        if(!s.exists()) return alert("Nómina no válida");
        const u = s.data();
        if(u.nivel === "Operador") start(u);
        else {
            document.getElementById('pin-box').style.display = 'block';
            if(pin === u.pin) start(u);
            else if(pin !== "") alert("PIN Incorrecto");
        }
    };

    function start(u) {
        user = u;
        document.getElementById('user-display').innerText = u.nombre;
        document.getElementById('ui-login').style.display = 'none';
        document.getElementById('ui-scan').style.display = 'block';
        navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}}).then(s => {
            track = s.getVideoTracks()[0];
            document.getElementById('webcam').srcObject = s; ocrLoop();
        });
    }

    async function logToDB(status, msg = "") {
        await addDoc(collection(db, "Bitacora_Incidencias"), {
            usuario: user.nombre, status, customer_id: jamaita || "N/A", error_msg: msg, timestamp: serverTimestamp()
        });
    }

    window.handleRetry = () => {
        retryCount++;
        document.getElementById('retry-counter').innerText = `Intentos: ${retryCount}/5`;
        if (retryCount >= 5) {
            logToDB("NG", "Bloqueo por límite de reintentos (5/5)");
            document.getElementById('lock-msg').innerText = "EXCESO DE REINTENTOS";
            document.getElementById('lock').style.display = 'flex';
        } else {
            paused = false;
            document.getElementById('btn-res').style.display = 'none';
            document.getElementById('res-val').innerText = "---";
            ocrLoop();
        }
    };

    async function ocrLoop() {
        if(paused || step > 3) return;
        const v = document.getElementById('webcam');
        const c = document.createElement('canvas'); c.width = 400; c.height = 300;
        c.getContext('2d').drawImage(v, 0, 0, 400, 300);
        const { data: { text } } = await Tesseract.recognize(c, 'eng');
        const raw = text.toUpperCase().split(/[\s\n]+/);
        
        let fs = null; let fm = null;
        for (let w of raw) {
            const p = w.replace(/[^A-Z0-9]/g, '');
            if (p.match(/^[TKP]\d{3,4}$/) && !w.includes('-') && w.length <= 5) fs = p;
            if (p.match(/^M\d{3,4}$/)) fm = p;
        }

        if ((step === 1 || step === 2) && fs) processFound(fs);
        else if (step === 3 && fm) processFound(fm);

        if(!paused) requestAnimationFrame(ocrLoop);
    }

    async function processFound(val) {
        paused = true;
        document.getElementById('res-val').innerText = val;
        document.getElementById('btn-res').style.display = 'block';

        if(step === 1) { 
            jamaita = val; 
            logToDB("OK", "Paso 1: Jamaita detectada");
        } else if(step === 2) {
            if(val !== jamaita) {
                logToDB("NG", `Mezcla: Jamaita ${jamaita} vs Caja ${val}`);
                document.getElementById('lock-msg').innerText = "MEZCLA DE SEBANGO";
                document.getElementById('lock').style.display = 'flex';
            } else {
                logToDB("OK", "Paso 2: Caja OK");
            }
        } else if(step === 3) {
            const s = await getDoc(doc(db, "Maestro_Partes", val));
            if(s.exists() && String(s.data().Sebango) === jamaita) {
                pendingData = s.data();
                logToDB("OK", "Paso 3: ID Cliente OK");
            } else {
                logToDB("NG", `ID ${val} no pertenece a ${jamaita}`);
                document.getElementById('lock-msg').innerText = "ID CLIENTE INCORRECTO";
                document.getElementById('lock').style.display = 'flex';
            }
        }
    }

    window.goNext = () => {
        if(step === 3 && pendingData) {
            initStep4(pendingData);
            return;
        }
        step++; paused = false;
        document.getElementById('btn-res').style.display = 'none';
        document.getElementById('res-val').innerText = "---";
        const t = document.getElementById('step-txt');
        if(step === 2) t.innerText = "PASO 2: CAJA";
        if(step === 3) t.innerText = "PASO 3: ID CLIENTE";
        ocrLoop();
    };

    function initStep4(data) {
        step = 4;
        document.getElementById('step-txt').innerText = "PASO 4: TEKIN VISUAL";
        document.getElementById('controls-standard').style.display = 'none';
        document.getElementById('step4-container').style.display = 'block';
        
        const img = document.getElementById('img-tekin');
        img.src = data.img_url; img.style.display = 'block';
        
        correctTekin = data.Tekin || "S/D";
        const opts = [correctTekin, "TEKIN-00X", "TEKIN-ZZY"].sort(() => Math.random() - 0.5);
        
        const area = document.getElementById('options-area');
        area.innerHTML = "";
        opts.forEach(o => {
            const b = document.createElement('button');
            b.className = "option-btn";
            b.innerText = o;
            b.onclick = () => {
                if(o === correctTekin) {
                    area.innerHTML = "<p style='color:green; font-weight:bold; text-align:center;'>✅ TEKIN OK</p>";
                    document.getElementById('btn-finish').style.display = 'block';
                    logToDB("OK", "Paso 4: Tekin verificado");
                } else {
                    logToDB("NG", "Error selección visual Tekin");
                    document.getElementById('lock-msg').innerText = "ERROR DE SELECCIÓN VISUAL";
                    document.getElementById('lock').style.display = 'flex';
                }
            };
            area.appendChild(b);
        });
    }

    window.resetToStepOne = () => {
        step = 1; jamaita = ""; paused = false; retryCount = 0; pendingData = null;
        document.getElementById('step4-container').style.display = 'none';
        document.getElementById('controls-standard').style.display = 'block';
        document.getElementById('btn-finish').style.display = 'none';
        document.getElementById('btn-res').style.display = 'none';
        document.getElementById('retry-counter').innerText = "Intentos: 0/5";
        document.getElementById('step-txt').innerText = "PASO 1: JAMAITA";
        document.getElementById('res-val').innerText = "---";
        ocrLoop();
    };

    window.unlock = async () => {
        const p = document.getElementById('pin-tl').value;
        if(!p) return alert("Ingrese PIN");
        const q = query(collection(db, "Usuarios"), where("nivel", "==", "Lider"), where("pin", "==", p));
        const s = await getDocs(q);
        if(!s.empty) {
            // Desbloqueo exitoso: Reiniciamos la pieza actual
            document.getElementById('lock').style.display = 'none';
            document.getElementById('pin-tl').value = "";
            resetToStepOne();
        } else {
            alert("PIN de Líder Incorrecto");
        }
    };
</script>
</body>
</html>
