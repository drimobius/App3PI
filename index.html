<main>
    <div id="section-parts" class="card" style="display:block;">
        <h3>📦 Actualizar Maestro de Partes</h3>
        <p>Selecciona el Excel (ID_Cliente, Sebango, PN_Interno, QPC, Tekin_OK, Tekin_NG)</p>
        <input type="file" id="excel-file" accept=".xlsx, .xls">
        <button id="btn-upload">Subir a Firebase</button>
    </div>

    <div id="section-logs" class="card" style="display:none;">
        <h3>📊 Bitácora de Escaneos e Incidencias</h3>
        <table id="table-logs">
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>Operador</th>
                    <th>Status</th>
                    <th>ID Cliente</th>
                    <th>Detalle</th>
                </tr>
            </thead>
            <tbody id="log-body"></tbody>
        </table>
    </div>
</main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getFirestore, collection, setDoc, doc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA6Il03GHS4L_eDY1Kv3fMyF2EwuYLQ5qY",
        authDomain: "logistica-ktmex.firebaseapp.com",
        databaseURL: "https://logistica-ktmex-default-rtdb.firebaseio.com",
        projectId: "logistica-ktmex",
        storageBucket: "logistica-ktmex.firebasestorage.app",
        messagingSenderId: "166597623735",
        appId: "1:166597623735:web:c0f8d372bc1ee12d81b232",
        measurementId: "G-CBPWQ5YQS4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // --- LÓGICA DE NAVEGACIÓN ---
    function switchSection() {
        const hash = window.location.hash || '#parts';
        if (hash === '#parts') {
            document.getElementById('section-parts').style.display = 'block';
            document.getElementById('section-logs').style.display = 'none';
        } else if (hash === '#logs') {
            document.getElementById('section-parts').style.display = 'none';
            document.getElementById('section-logs').style.display = 'block';
        }
    }

    // Escuchar cambios en la URL
    window.addEventListener('hashchange', switchSection);
    // Ejecutar al cargar por primera vez
    switchSection();

    // --- LÓGICA DE CARGA EXCEL ---
    document.getElementById('btn-upload').addEventListener('click', () => {
        const file = document.getElementById('excel-file').files[0];
        if (!file) return alert("Por favor, selecciona un archivo Excel primero.");

        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);

                alert(`Procesando ${json.length} registros...`);

                for (const item of json) {
                    // Importante: El Excel debe tener la columna "ID_Cliente" exacta
                    const id = String(item.ID_Cliente || item.id_cliente); 
                    await setDoc(doc(db, "Maestro_Partes", id), item);
                }
                alert("Sincronización con Firebase exitosa.");
            } catch (err) {
                console.error(err);
                alert("Error al procesar el archivo. Revisa la consola.");
            }
        };
        reader.readAsArrayBuffer(file);
    });

    // --- LÓGICA DE LOGS ---
    const q = query(collection(db, "Bitacora_Incidencias"), orderBy("timestamp", "desc"));
    onSnapshot(q, (snapshot) => {
        const body = document.getElementById('log-body');
        body.innerHTML = "";
        snapshot.forEach(doc => {
            const data = doc.data();
            const date = data.timestamp?.toDate().toLocaleString() || 'En proceso...';
            body.innerHTML += `
                <tr>
                    <td>${date}</td>
                    <td>${data.usuario}</td>
                    <td style="font-weight:bold; color:${data.status === 'OK' ? '#27ae60' : '#e30613'}">${data.status}</td>
                    <td>${data.customer_id || '-'}</td>
                    <td>${data.error_msg || 'Validación Correcta'}</td>
                </tr>`;
        });
    });
</script>
