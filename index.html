<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KTMEX Scanner</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<style>
  body { font-family: sans-serif; margin: 0; background: #000; color: white; overflow: hidden; }
  video { width: 100%; height: 50%; object-fit: cover; display: block; }
 
  .panel {
    position: fixed; bottom: 0; width: 100%; height: 50%;
    background: white; color: #333;
    border-radius: 20px 20px 0 0;
    padding: 25px; box-sizing: border-box;
    overflow-y: auto;
  }
 
  .btn-next {
    background: #1a1c2c; color: white; border: none;
    padding: 18px; width: 100%; border-radius: 12px;
    font-weight: bold; font-size: 18px; margin-top: 10px;
    cursor: pointer;
  }
  .btn-next:disabled { background: #aaa; cursor: not-allowed; }
 
  .status-overlay {
    position: fixed; top: 0; width: 100%; height: 100%;
    z-index: 2000; display: none;
    align-items: center; justify-content: center;
    font-size: 30px; font-weight: bold;
    flex-direction: column; gap: 10px;
  }
 
  .lock-ui {
    position: fixed; top: 0; width: 100%; height: 100%;
    background: #e30613; z-index: 3000; display: none;
    flex-direction: column; align-items: center; justify-content: center;
    padding: 30px; text-align: center; box-sizing: border-box;
  }
 
  input {
    width: 100%; padding: 15px; margin-bottom: 10px;
    border: 1px solid #ddd; border-radius: 8px;
    font-size: 16px; box-sizing: border-box;
  }
  input.error-field { border-color: #e30613; }
 
  /* Feedback login */
  #login-feedback {
    font-size: 13px; padding: 8px 12px; border-radius: 6px;
    margin-bottom: 10px; display: none;
  }
  #login-feedback.error   { background: #fff5f5; color: #c53030; display: block; }
  #login-feedback.loading { background: #ebf8ff; color: #2b6cb0; display: block; }
 
  /* OCR status */
  #ocr-status {
    font-size: 12px; color: #a0aec0;
    text-align: center; min-height: 16px; margin-top: 4px;
  }
 
  /* PIN feedback en lock */
  #pin-lock-feedback {
    color: white; font-size: 13px;
    margin-bottom: 10px; min-height: 18px;
  }
 
  /* Etiqueta de nivel de usuario */
  #user-badge {
    font-size: 12px; background: #edf2f7; color: #4a5568;
    padding: 4px 10px; border-radius: 20px; display: inline-block;
    margin-bottom: 10px;
  }
</style>
</head>
<body>
 
<video id="webcam" autoplay playsinline></video>
 
<div class="panel">
 
  <!-- LOGIN -->
<div id="ui-login">
<h2 style="color:#e30613; margin-top:0;">Acceso KTMEX</h2>
<input type="text" id="nom-input" placeholder="Nómina" autocomplete="off">
 
    <!-- FIX: PIN solo visible para Líderes, con instrucción clara -->
<div id="pin-box" style="display:none;">
<p style="font-size:13px; color:#718096; margin:0 0 6px 0;">
        Cuenta de Líder detectada — ingresa tu PIN para continuar.
</p>
<input type="password" id="pin-input" placeholder="PIN de Líder">
</div>
 
    <div id="login-feedback"></div>
<button class="btn-next" id="btn-login" onclick="window.checkLogin()">Ingresar</button>
</div>
 
  <!-- ESCANEO -->
<div id="ui-scan" style="display:none;">
<div id="user-badge">👤 —</div>
<h3 id="step-txt" style="margin:4px 0 8px 0;">PASO 1: JAMAITA</h3>
 
    <!-- FIX: Contexto de qué está buscando el OCR -->
<div id="res-val" style="font-size:28px; font-weight:bold; color:#e30613; text-align:center; padding:15px 0;">
      🔍 Apunta la cámara al código
</div>
<div id="ocr-status"></div>
 
    <button id="btn-res" class="btn-next"
      style="display:none; background:#27ae60;"
      onclick="window.goNext()">
      CONTINUAR ▶
</button>
</div>
 
</div>
 
<!-- OK overlay -->
<div id="ok-msg" class="status-overlay" style="background:rgba(39,174,96,0.93);">
<span style="font-size:60px;">✅</span>
<span>CORRECTO</span>
</div>
 
<!-- NG overlay -->
<div id="ng-msg" class="status-overlay" style="background:rgba(227,6,19,0.93);">
<span style="font-size:60px;">❌</span>
<span>ERROR</span>
</div>
 
<!-- LOCK -->
<div id="lock" class="lock-ui">
<h1 style="font-size:60px; margin:0;">🛑</h1>
<h2 id="lock-reason" style="margin:10px 0 20px;">BLOQUEO</h2>
<p style="opacity:0.9; margin-bottom:15px;">Solicita desbloqueo a tu Líder (TL)</p>
<input type="password" id="pin-tl" placeholder="PIN LÍDER"
    style="text-align:center; max-width:220px; color:#333;">
<div id="pin-lock-feedback"></div>
<!-- FIX: Botón llama a window.unlock() correctamente -->
<button class="btn-next" style="background:white; color:#e30613; max-width:220px;"
    onclick="window.unlock()">
    DESBLOQUEAR
</button>
</div>
 
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
  import {
    getFirestore, doc, getDoc, collection, addDoc,
    serverTimestamp, query, where, getDocs
  } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";
 
  // FIX: Credenciales reales restauradas (estaban como placeholder vacío)
  const firebaseConfig = {
    apiKey: "AIzaSyA6Il03GHS4L_eDY1Kv3fMyF2EwuYLQ5qY",
    authDomain: "logistica-ktmex.firebaseapp.com",
    projectId: "logistica-ktmex",
    storageBucket: "logistica-ktmex.firebasestorage.app",
    messagingSenderId: "166597623735",
    appId: "1:166597623735:web:c0f8d372bc1ee12d81b232"
  };
 
  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
 
  let user         = null;
  let step         = 1;
  let jamaita      = "";
  let scannerActive = false;   // FIX: control limpio del loop
  let ocrRunning   = false;    // FIX: evita llamadas apiladas a Tesseract
  let currentID    = "";       // FIX: para registrar customer_id en bitácora
 
  // ─── HELPERS ──────────────────────────────────────────────────────────────
  function setLoginFeedback(type, msg) {
    const el = document.getElementById('login-feedback');
    el.className = type;
    el.textContent = msg;
  }
 
  function setOcrStatus(msg) {
    document.getElementById('ocr-status').textContent = msg;
  }
 
  // ─── FIX: LOGIN ROBUSTO ────────────────────────────────────────────────────
  // Antes: lógica rota para Líder, alert(), sin manejo de usuario inexistente.
  // Ahora: flujo claro en dos fases, feedback visual, sin alert().
  window.checkLogin = async () => {
    const nomInput = document.getElementById('nom-input');
    const pinInput = document.getElementById('pin-input');
    const pinBox   = document.getElementById('pin-box');
    const btnLogin = document.getElementById('btn-login');
    const nom      = nomInput.value.trim();
 
    if (!nom) {
      nomInput.classList.add('error-field');
      setLoginFeedback('error', '⚠️ Ingresa tu número de nómina.');
      return;
    }
    nomInput.classList.remove('error-field');
 
    btnLogin.disabled = true;
    setLoginFeedback('loading', '⏳ Verificando...');
 
    try {
      const snap = await getDoc(doc(db, "Usuarios", nom));
 
      if (!snap.exists()) {
        setLoginFeedback('error', '❌ Nómina no registrada. Contacta a tu TL.');
        btnLogin.disabled = false;
        return;
      }
 
      const u = snap.data();
 
      if (u.nivel === "Operador") {
        // Operador: acceso directo sin PIN
        setLoginFeedback('loading', '✅ Acceso concedido. Iniciando cámara...');
        await startApp(u);
 
      } else {
        // Líder: requiere PIN
        pinBox.style.display = 'block';
        const pin = pinInput.value.trim();
 
        if (!pin) {
          // Primera pasada: mostrar campo PIN y pedir que lo ingrese
          setLoginFeedback('error', '🔑 Ingresa tu PIN de Líder para continuar.');
          btnLogin.disabled = false;
          pinInput.focus();
          return;
        }
 
        if (pin !== String(u.pin)) {
          // PIN incorrecto
          setLoginFeedback('error', '❌ PIN incorrecto. Intenta de nuevo.');
          pinInput.value = '';
          pinInput.focus();
          btnLogin.disabled = false;
          return;
        }
 
        // PIN correcto
        setLoginFeedback('loading', '✅ Acceso de Líder concedido. Iniciando cámara...');
        await startApp(u);
      }
 
    } catch (err) {
      setLoginFeedback('error', `❌ Error de conexión: ${err.message}`);
      btnLogin.disabled = false;
    }
  };
 
  // ─── FIX: INICIO DE CÁMARA CON MANEJO DE ERROR ────────────────────────────
  async function startApp(u) {
    user = u;
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" }
      });
      document.getElementById('webcam').srcObject = stream;
      document.getElementById('ui-login').style.display = 'none';
      document.getElementById('ui-scan').style.display  = 'block';
      document.getElementById('user-badge').textContent =
        `👤 ${u.nombre || u.Nomina} — ${u.nivel}`;
 
      scannerActive = true;
      runLoop();
 
    } catch (err) {
      // FIX: Error de permisos de cámara con mensaje claro
      setLoginFeedback('error', '❌ No se pudo acceder a la cámara. Verifica los permisos.');
      document.getElementById('btn-login').disabled = false;
    }
  }
 
  // ─── FIX: LOOP OCR CONTROLADO ──────────────────────────────────────────────
  // Antes: requestAnimationFrame siempre al final, Tesseract apilado, canvas fijo 400×300.
  // Ahora: flags scannerActive y ocrRunning, canvas con dimensiones reales del video.
  async function runLoop() {
    const video = document.getElementById('webcam');
    const canvas = document.createElement('canvas');
    const ctx    = canvas.getContext('2d');
 
    const loop = async () => {
      if (!scannerActive) return;
      if (ocrRunning)     { requestAnimationFrame(loop); return; }
 
      // FIX: Esperar a que el video tenga dimensiones reales
      if (video.videoWidth === 0 || video.videoHeight === 0) {
        requestAnimationFrame(loop);
        return;
      }
 
      ocrRunning = true;
      setOcrStatus('🔍 Analizando...');
 
      // FIX: Canvas con dimensiones reales del video (no fijas 400×300)
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
 
      try {
        // FIX: Timeout de 4s para evitar bloqueos de Tesseract
        const ocrPromise = Tesseract.recognize(canvas, 'eng');
        const timeout    = new Promise((_, reject) =>
          setTimeout(() => reject(new Error('timeout')), 4000)
        );
        const { data: { text } } = await Promise.race([ocrPromise, timeout]);
 
        const raw = text.replace(/\s/g, '').toUpperCase();
        const mJ  = raw.match(/[KTP]\d{3,4}/);
        const mM  = raw.match(/M\d{3,4}/);
 
        setOcrStatus('');
 
        if      (step === 1 && mJ) found(mJ[0]);
        else if (step === 2 && mJ) found(mJ[0]);
        else if (step === 3 && mM) found(mM[0]);
 
      } catch (err) {
        setOcrStatus('');
        console.warn('OCR:', err.message);
      }
 
      ocrRunning = false;
      requestAnimationFrame(loop);
    };
 
    loop();
  }
 
  // ─── FOUND ─────────────────────────────────────────────────────────────────
  function found(val) {
    scannerActive = false; // Pausar scanner mientras se procesa
    currentID = val;
    document.getElementById('res-val').textContent = val;
 
    if (step === 1) {
      jamaita = val;
      showResult(true);
 
    } else if (step === 2) {
      if (val === jamaita) showResult(true);
      else showResult(false, `Mezcla de Sebango: esperaba ${jamaita}, detecté ${val}`);
 
    } else if (step === 3) {
      checkMaestro(val);
    }
  }
 
  // ─── FIX: checkMaestro con manejo de documento inexistente ────────────────
  async function checkMaestro(id) {
    try {
      const snap = await getDoc(doc(db, "Maestro_Partes", id));
 
      if (!snap.exists()) {
        showResult(false, `${id} no encontrado en Maestro de Partes`);
        return;
      }
 
      const data = snap.data();
 
      // FIX: Compatibilidad con img_b64 (nuevo) e img_url (legacy)
      // No se usa aquí visualmente pero se registra para trazabilidad
      if (String(data.Sebango).toUpperCase() === jamaita.toUpperCase()) {
        showResult(true);
      } else {
        showResult(false, `${id} requiere Sebango ${data.Sebango}, no ${jamaita}`);
      }
 
    } catch (err) {
      showResult(false, `Error al consultar Maestro: ${err.message}`);
    }
  }
 
  // ─── SHOW RESULT ───────────────────────────────────────────────────────────
  function showResult(ok, msg = "") {
    const elId = ok ? 'ok-msg' : 'ng-msg';
    const el   = document.getElementById(elId);
    el.style.display = 'flex';
 
    setTimeout(() => {
      el.style.display = 'none';
      if (ok) {
        document.getElementById('btn-res').style.display = 'block';
        // Reactivar scanner solo si el usuario presiona CONTINUAR
      } else {
        lockOut(msg);
      }
    }, 1500);
  }
 
  // ─── FIX: goNext con validación de step máximo ────────────────────────────
  window.goNext = () => {
    if (step >= 3) return; // FIX: no superar step 3
 
    step++;
    document.getElementById('btn-res').style.display = 'none';
    document.getElementById('res-val').textContent   = '🔍 Apunta la cámara al código';
 
    // FIX: Texto de paso correcto para cada step
    const pasos = { 2: 'PASO 2: CAJA', 3: 'PASO 3: TTMX (MXXX)' };
    document.getElementById('step-txt').textContent = pasos[step] || '';
 
    scannerActive = true;
    runLoop();
  };
 
  // ─── FIX: lockOut registra customer_id en bitácora ────────────────────────
  function lockOut(msg) {
    document.getElementById('lock-reason').textContent = msg;
    document.getElementById('lock').style.display      = 'flex';
 
    // FIX: Incluye customer_id (faltaba antes) y manejo de error en addDoc
    addDoc(collection(db, "Bitacora_Incidencias"), {
      usuario:     user?.nombre || '—',
      status:      "ERROR",
      customer_id: currentID || "N/A",   // FIX: campo faltante
      error_msg:   msg,
      timestamp:   serverTimestamp()
    }).catch(err => console.error('Error bitácora:', err));
  }
 
  // ─── FIX: unlock sin alert(), con feedback visual ─────────────────────────
  window.unlock = async () => {
    const pin      = document.getElementById('pin-tl').value.trim();
    const feedback = document.getElementById('pin-lock-feedback');
 
    if (!pin) {
      feedback.textContent = '⚠️ Ingresa el PIN del Líder.';
      return;
    }
 
    feedback.textContent = '⏳ Verificando...';
 
    try {
      const q    = query(
        collection(db, "Usuarios"),
        where("nivel", "==", "Lider"),
        where("pin",   "==", pin)
      );
      const snap = await getDocs(q);
 
      if (!snap.empty) {
        feedback.textContent = '✅ PIN correcto. Reiniciando...';
        setTimeout(() => location.reload(), 1000);
      } else {
        feedback.textContent = '❌ PIN incorrecto. Intenta de nuevo.';
        document.getElementById('pin-tl').value = '';
      }
    } catch (err) {
      feedback.textContent = `❌ Error de conexión: ${err.message}`;
    }
  };
</script>
</body>
</html>
