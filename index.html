<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KTMEX App B</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #000; color: white; }
        #cam-box { position: fixed; top: 0; width: 100%; height: 55%; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .guide { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; height: 30%; border: 2px solid #fabb00; box-shadow: 0 0 0 1000px rgba(0,0,0,0.6); }
        .panel { position: fixed; bottom: 0; width: 100%; height: 45%; background: white; color: #333; border-radius: 20px 20px 0 0; padding: 25px; box-sizing: border-box; }
        .btn { background: #e30613; color: white; border: none; padding: 18px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 18px; }
        .lock { position: fixed; top: 0; width: 100%; height: 100%; background: #e30613; z-index: 1000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .quiz-btn { background: #f8f9fa; border: 2px solid #ddd; padding: 15px; width: 100%; margin-bottom: 10px; border-radius: 10px; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

<div id="cam-box">
    <video id="video" autoplay playsinline></video>
    <div class="guide"></div>
</div>

<div class="panel">
    <div id="step-login">
        <h2 style="margin:0 0 15px 0; color:#e30613;">Inspección KTMEX</h2>
        <input type="text" id="user" placeholder="Nómina" style="width:100%; padding:15px; margin-bottom:15px; border:1px solid #ddd; border-radius:8px; box-sizing:border-box;">
        <button class="btn" onclick="startApp()">Entrar a Proceso</button>
    </div>

    <div id="step-scan" style="display:none">
        <h3 id="instr" style="margin-top:0;">Paso 1: Escanea JAMAITA</h3>
        <p id="hint" style="color:#666;">Buscando código K/T/P...</p>
    </div>

    <div id="step-quiz" style="display:none">
        <h3 style="margin-top:0;">Validación Visual</h3>
        <div id="img-ref"></div>
        <div id="options" style="margin-top:15px;"></div>
    </div>
</div>

<div id="lock" class="lock">
    <h1>⚠️ BLOQUEO</h1>
    <p id="error-msg" style="padding:20px; text-align:center; font-weight:bold;"></p>
    <input type="password" id="pin" placeholder="PIN LÍDER" style="padding:15px; border-radius:8px; border:none; margin-bottom:10px; text-align:center;">
    <button onclick="location.reload()" style="background:white; color:red; padding:15px 30px; border-radius:8px; border:none; font-weight:bold;">REINTENTAR</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA6Il03GHS4L_eDY1Kv3fMyF2EwuYLQ5qY",
        authDomain: "logistica-ktmex.firebaseapp.com",
        databaseURL: "https://logistica-ktmex-default-rtdb.firebaseio.com",
        projectId: "logistica-ktmex",
        storageBucket: "logistica-ktmex.firebasestorage.app",
        messagingSenderId: "166597623735",
        appId: "1:166597623735:web:c0f8d372bc1ee12d81b232"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let stage = 1; // 1: Jamaita, 2: Caja, 3: TTMX
    let operator = "";
    let jamaita = "";
    let partData = null;

    window.startApp = async () => {
        operator = document.getElementById('user').value;
        if(!operator) return;
        document.getElementById('step-login').style.display = 'none';
        document.getElementById('step-scan').style.display = 'block';
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('video').srcObject = stream;
        runOCR();
    };

    async function runOCR() {
        const video = document.getElementById('video');
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');

        const loop = async () => {
            if(stage > 3) return;
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            
            const { data: { text } } = await Tesseract.recognize(canvas, 'eng');
            
            // RECONOCIMIENTO MEJORADO: K, T o P + dígitos
            const foundJ = text.match(/[KTP]\d{3,4}/);
            const foundM = text.match(/M\d{3,4}/);

            if (stage === 1 && foundJ) {
                jamaita = foundJ[0];
                stage = 2;
                document.getElementById('instr').innerText = "Paso 2: Escanea CAJA";
                document.getElementById('hint').innerText = `Jamaita OK: ${jamaita}`;
            } 
            else if (stage === 2 && foundJ) {
                if (foundJ[0] !== jamaita) return stopAndLock(`Mezcla: Jamaita ${jamaita} vs Caja ${foundJ[0]}`);
                stage = 3;
                document.getElementById('instr').innerText = "Paso 3: Escanea TTMX (MXXX)";
            }
            else if (stage === 3 && foundM) {
                const snap = await getDoc(doc(db, "Maestro_Partes", foundM[0]));
                if (snap.exists()) {
                    partData = snap.data();
                    if (String(partData.Sebango) !== jamaita) {
                        stopAndLock(`Error Cruzado: TTMX ${foundM[0]} exige Sebango ${partData.Sebango}`);
                    } else {
                        showQuiz();
                    }
                }
            }
            requestAnimationFrame(loop);
        };
        loop();
    }

    function showQuiz() {
        stage = 4;
        document.getElementById('step-scan').style.display = 'none';
        document.getElementById('step-quiz').style.display = 'block';
        
        if(partData.img_url) {
            document.getElementById('img-ref').innerHTML = `<img src="${partData.img_url}" style="width:100%; border-radius:10px;">`;
        }
        
        const opts = [partData.Tekin_OK, partData.Tekin_NG].sort(() => Math.random() - 0.5);
        const optDiv = document.getElementById('options');
        optDiv.innerHTML = `<p>Selecciona el TEKIN para ${partData.ID_Cliente}</p>`;
        opts.forEach(o => {
            optDiv.innerHTML += `<button class="quiz-btn" onclick="checkTekin('${o}')">${o}</button>`;
        });
    }

    window.checkTekin = async (val) => {
        if(val === String(partData.Tekin_OK)) {
            await log("OK", partData.ID_Cliente);
            alert("Proceso Correcto");
            location.reload();
        } else {
            stopAndLock(`Tekin Incorrecto: Seleccionó ${val}`);
        }
    };

    async function stopAndLock(msg) {
        stage = 99;
        document.getElementById('error-msg').innerText = msg;
        document.getElementById('lock').style.display = 'flex';
        await log("ERROR", partData?.ID_Cliente || "N/A", msg);
    }

    async function log(st, id, msg = "") {
        await addDoc(collection(db, "Bitacora_Incidencias"), {
            usuario: operator, status: st, customer_id: id, error_msg: msg, timestamp: serverTimestamp()
        });
    }
</script>
</body>
</html>
